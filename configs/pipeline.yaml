# ZhongJing-TCM benchmark — global pipeline configuration.
# All relative paths are resolved against the repository root (see src/config.py).

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  final_dir: data/final
  results_dir: results
  topic_model_dir: data/interim/topic_model
  cache_dir: .cache/llm

lexicons:
  tcm_terms: lexicons/tcm_terms.txt
  stopwords: lexicons/stopwords_zh.txt
  category_anchors: lexicons/category_anchors.yaml

prompts:
  gen_question: prompts/gen_question.v5.txt
  stager_eval: prompts/stager_eval.txt
  judge_quality: prompts/judge_quality.txt
  judge_validity: prompts/judge_validity.txt
  judge_short_answer: prompts/judge_short_answer.txt
  patient_sim: prompts/patient_sim.txt          # T2 patient simulator
  expert_inquiry: prompts/expert_inquiry.txt    # T2 expert (model under test)
  gen_counterfactual: prompts/gen_counterfactual.txt  # T1 counterfactual minimal pair
  prm_step: prompts/prm_step.txt                # L2 step-level process preference
  rubric_grade: prompts/rubric_grade.txt        # L3/L4 rubric grading judge
  tool_agent: prompts/tool_agent.txt            # T3 tool-use agent
  mdt_agent: prompts/mdt_agent.txt              # T5 MDT specialty agent
  dialogue: prompts/dialogue.txt                # T6 multi-turn dialogue responder
  confidence_eval: prompts/confidence_eval.txt  # confidence calibration (ECE)

# ---- M1 ingest -------------------------------------------------------------
ingest:
  min_chars: 100          # drop articles shorter than this after cleaning
  dedup_threshold: 0.85   # MinHash LSH Jaccard threshold for de-duplication
  minhash_perm: 128
  extensions: [".txt", ".md", ".html", ".htm", ".docx"]  # document types to read

# ---- M2 quality gate -------------------------------------------------------
quality:
  min_chars: 300
  min_tcm_density: 0.04   # share of tokens that are TCM terms
  max_ad_hits: 8          # promotional-term occurrences before an article is dropped
  overall_threshold: 6.0  # mean of the three LLM dimensions to pass the gate
  judge_model: Kimi-K2.6  # quality judge (same Azure generator deployment)

# ---- M3 topic modelling ----------------------------------------------------
topic:
  embedding_model: BAAI/bge-large-zh-v1.5
  max_len: 400            # max chars per passage before sliding-window split
  overlap: 80
  min_passage_len: 50
  min_cluster_size: 15    # HDBSCAN
  umap_components: 5       # reduce-then-cluster dimensionality
  umap_neighbors: 15
  nr_topics: 175          # target topic count (paper scale); null = auto
  reduce_outliers: true
  random_state: 42

# ---- M5 generation ---------------------------------------------------------
generate:
  model: Kimi-K2.6        # default question generator (Azure deployment name)
  max_passage_chars: 1500
  prompt_version: v5
  language: 简体中文        # 生成题目的默认语言(题干/选项/解析等);注入 {language} 占位符

# ---- M6 DTQF dynamic filtering --------------------------------------------
dtqf:
  sample_size: 100        # S — per-iteration review budget
  max_iter: 20
  qualify_threshold: 0.95 # stop once P_qualified exceeds this
  kappa_threshold: 0.8    # min inter-annotator agreement (Cohen's kappa)
  use_llm_judge: false    # set true to enable the optional LLM validity check
  min_stem_chars: 15
  min_explanation_chars: 20
  w2v:
    vector_size: 200
    window: 5
    min_count: 2

# ---- M7 assemble -----------------------------------------------------------
assemble:
  diagnostic_frac: 0.10   # stratified 10% diagnostic split
  token_encoding: cl100k_base

# ---- M8 evaluate -----------------------------------------------------------
evaluate:
  n_runs: 3               # repeated runs per question (majority vote)
  # Models under test (Azure deployment names). Kimi-K2.6 is the generator above;
  # the rest are the test models. Reasoning deployments (o4-mini, Phi-4-reasoning,
  # grok-4-20-reasoning) have their unsupported params dropped automatically.
  models:
    - o4-mini
    - Phi-4-reasoning
    - grok-4-20-reasoning
    - DeepSeek-V3.2
    - Mistral-Large-3
    - Kimi-K2.5
    - Kimi-K2.6
  perturbations: [shuffle, cjk, numeric]   # option-order / label-symbol invariance

# ---- M9 statistics ---------------------------------------------------------
stats:
  num_segments: 2         # DP token-segmentation pieces per model

# ---- LLM client ------------------------------------------------------------
llm:
  provider: azure         # openai | minimax | azure | mock
  # Azure: set provider: azure (OpenAI-compatible v1 endpoint). The client reads
  # AZURE_API_KEY and defaults base_url to the Azure resource's /openai/v1 URL
  # (override via AZURE_BASE_URL). generate.model / quality.judge_model /
  # evaluate.models hold the Azure *deployment* names (Kimi-K2.6, o4-mini, …).
  # MiniMax: set provider: minimax (reads MINIMAX_API_KEY, base_url
  # https://api.minimaxi.com/v1, model e.g. MiniMax-M3).
  base_url: null          # optional endpoint override (else AZURE_BASE_URL / OPENAI_BASE_URL / MINIMAX_BASE_URL)
  temperature: 0.2
  max_tokens: 8192        # output cap; large enough for long explanations / short-answers
  timeout: 60
  max_concurrency: 4      # parallel passages during M5 generation
  use_cache: true
